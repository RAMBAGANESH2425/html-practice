<!DOCTYPE html>
<html>
<head>
    <title>My Web Page</title>
</head>

<body>

    <h1>Welcome to My Webpage</h1>
    <h2>This is a heading</h2>

    <p>This is a paragraph demonstrating HTML tags.</p>

    <!-- Text Formatting -->
    <b>Bold Text</b><br>
    <i>Italic Text</i><br>
    <u>Underlined Text</u>

    <!-- List -->
    <h3>List Example</h3>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <!-- Image -->
    <h3>Image Example</h3>
    <img src="https://picsum.photos/150" alt="Sample Image">
    <!-- Link -->
    <h3>Link Example</h3>
    <a href="https://www.google.com" target="_blank">Go to Google</a>

    <!-- Table -->
    <h3>Table Example</h3>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ganesh</td>
            <td>22</td>
        </tr>
    </table>

    <!-- Form -->
    <h3>Form Example</h3>
    <form>
        Name: <input type="text"><br><br>
        Email: <input type="email"><br><br>
        <input type="submit" value="Submit">
    </form>

</body>
</html>
