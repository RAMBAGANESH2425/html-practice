<!DOCTYPE html>
<html>
<head>
    <title>My Simple Web Page</title>
</head>

<body>

    <h1>Welcome to My Web Page</h1>
    <h2>Basic HTML Practice</h2>

    <p>This page shows different HTML tags and their usage.</p>

    <h3>Text Formatting</h3>
    <p><b>Bold Text</b></p>
    <p><i>Italic Text</i></p>
    <p><u>Underlined Text</u></p>

    <h3>List Example</h3>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

    <h3>Image Example</h3>
    <img src="https://picsum.photos/150" alt="Random Image">

    <h3>Link Example</h3>
    <a href="https://www.google.com" target="_blank">Visit Google</a>

    <h3>Table Example</h3>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ganesh</td>
            <td>22</td>
        </tr>
    </table>

    <h3>Form Example</h3>
    <form>
        <label>Name:</label>
        <input type="text"><br><br>

        <label>Email:</label>
        <input type="email"><br><br>

        <input type="submit" value="Submit">
    </form>

</body>
</html>
